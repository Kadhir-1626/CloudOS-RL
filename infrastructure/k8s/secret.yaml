# =============================================================================
# CloudOS-RL Secrets
# =============================================================================
# IMPORTANT: Do NOT commit real secrets to git.
# This file uses placeholder base64 values.
# Replace with real values using:
#   kubectl create secret generic cloudos-secrets \
#     --from-literal=ELECTRICITY_MAPS_API_KEY=your_key \
#     --from-literal=AWS_ACCESS_KEY_ID=your_key \
#     --from-literal=AWS_SECRET_ACCESS_KEY=your_secret \
#     -n cloudos-rl --dry-run=client -o yaml > infrastructure/k8s/secret.yaml
#
# Placeholder base64 values below = empty strings ""
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cloudos-secrets
  namespace: cloudos-rl
  labels:
    app.kubernetes.io/name:      cloudos-rl
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # echo -n "your_key" | base64
  ELECTRICITY_MAPS_API_KEY: ""   # optional — static carbon fallback used if empty
  AWS_ACCESS_KEY_ID:        ""   # leave empty to use IAM role / instance profile
  AWS_SECRET_ACCESS_KEY:    ""   # leave empty to use IAM role / instance profile
  AWS_DEFAULT_REGION:       dXMtZWFzdC0x   # us-east-1