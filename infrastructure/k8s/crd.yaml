# =============================================================================
# CloudOS-RL Custom Resource Definition
# CloudWorkload — represents a workload submission to the RL scheduler
# =============================================================================
# Usage:
#   kubectl apply -f infrastructure/k8s/crd.yaml
#   kubectl get cloudworkloads -n cloudos-rl
#   kubectl describe cloudworkload my-ml-job -n cloudos-rl
# =============================================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cloudworkloads.cloudos.ai
  labels:
    app.kubernetes.io/name:      cloudos-rl
    app.kubernetes.io/component: crd
spec:
  group: cloudos.ai
  scope: Namespaced
  names:
    plural:   cloudworkloads
    singular: cloudworkload
    kind:     CloudWorkload
    shortNames:
      - cw
      - cwl
  versions:
    - name: v1alpha1
      served:  true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name:     Cloud
          type:     string
          jsonPath: .status.scheduledCloud
        - name:     Region
          type:     string
          jsonPath: .status.scheduledRegion
        - name:     Instance
          type:     string
          jsonPath: .status.instanceType
        - name:     CostSavings
          type:     string
          jsonPath: .status.costSavingsPct
        - name:     Phase
          type:     string
          jsonPath: .status.phase
        - name:     Age
          type:     date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["workloadType", "resources"]
              properties:

                workloadType:
                  type: string
                  enum: [training, inference, batch, streaming]
                  description: "Type of cloud workload"

                priority:
                  type: integer
                  minimum: 1
                  maximum: 4
                  default: 2
                  description: "Scheduling priority (1=low, 4=critical)"

                spotTolerant:
                  type: boolean
                  default: false
                  description: "Whether this workload tolerates spot instance interruption"

                resources:
                  type: object
                  required: ["cpu", "memory"]
                  properties:
                    cpu:
                      type: string
                      pattern: "^[0-9]+(\\.[0-9]+)?$"
                      description: "CPU request in vCPUs (e.g. '4', '0.5')"
                    memory:
                      type: string
                      pattern: "^[0-9]+(\\.[0-9]+)?(Gi|Mi|GB|MB)?$"
                      description: "Memory request (e.g. '8Gi', '16GB')"
                    gpu:
                      type: integer
                      minimum: 0
                      default: 0
                      description: "Number of GPUs required"
                    storage:
                      type: string
                      default: "50Gi"
                      description: "Storage request"
                    networkBandwidthGbps:
                      type: number
                      minimum: 0.1
                      default: 1.0

                sla:
                  type: object
                  properties:
                    maxLatencyMs:
                      type: integer
                      minimum: 10
                      default: 200
                      description: "Maximum acceptable scheduling latency in ms"
                    tier:
                      type: string
                      enum: [best_effort, standard, premium, critical]
                      default: standard

                constraints:
                  type: object
                  properties:
                    preferredClouds:
                      type: array
                      items:
                        type: string
                        enum: [aws, gcp, azure]
                    excludeRegions:
                      type: array
                      items:
                        type: string
                    maxCostPerHr:
                      type: number
                      minimum: 0
                    maxCarbonGco2PerKwh:
                      type: number
                      minimum: 0
                      description: "Maximum acceptable carbon intensity"

                expectedDurationHours:
                  type: number
                  minimum: 0.1
                  default: 1.0

            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Scheduling, Scheduled, Running, Completed, Failed]
                scheduledCloud:
                  type: string
                scheduledRegion:
                  type: string
                instanceType:
                  type: string
                purchaseOption:
                  type: string
                estimatedCostPerHr:
                  type: number
                costSavingsPct:
                  type: string
                carbonSavingsPct:
                  type: string
                schedulingLatencyMs:
                  type: number
                decisionId:
                  type: string
                scheduledAt:
                  type: string
                  format: date-time
                message:
                  type: string
                explanation:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true